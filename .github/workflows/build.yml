name: Build Windows App

on:
  push:
    branches: [main]
  workflow_dispatch: # allows you to trigger it manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_GEMINI_API_KEY: placeholder

      - name: Build Electron installer
        run: npx electron-builder --win --publish never

      - name: Upload installer as artefact
        uses: actions/upload-artifact@v4
        with:
          name: Jareth-Windows-Installer
          path: dist/*.exe
          retention-days: 30
